org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Project (D:) and the pub cache (C:) live on different drives, which breaks
# Kotlin incremental compilation's relative-path cache (plugin sources fail to
# relativize across roots). Disable it for reliable rebuilds.
kotlin.incremental=false
